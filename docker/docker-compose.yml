# ─────────────────────────────────────────────────────────────────────────────
# AI Growth Manager – Local Development Stack
#
# Services:
#   postgres  – PostgreSQL 16 (primary database)
#   redis     – Redis 7 (BullMQ job queue + cache)
#   app       – Node.js backend (optional: comment out to run backend locally)
#
# Usage:
#   Start only infra (recommended for local dev):
#     docker compose -f docker/docker-compose.yml up postgres redis -d
#
#   Start full stack:
#     docker compose -f docker/docker-compose.yml up -d
#
#   Stop everything:
#     docker compose -f docker/docker-compose.yml down
#
#   Wipe all data volumes:
#     docker compose -f docker/docker-compose.yml down -v
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai_growth_postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Newdelhi2025
      POSTGRES_DB: ai_growth_manager
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/src/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ai_growth_manager']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - ai_growth_net

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai_growth_redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - ai_growth_net

  # ── Backend App (optional – comment out to run with `npm run dev` locally) ───
  app:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    container_name: ai_growth_backend
    ports:
      - '3001:3001'
    env_file:
      - ../backend/.env
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=Newdelhi2025
      - DB_NAME=ai_growth_manager
      - POSTGRES_URI=postgresql://postgres:Newdelhi2025@postgres:5432/ai_growth_manager
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai_growth_net
    profiles:
      - full  # Only starts with: docker compose --profile full up

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ai_growth_net:
    driver: bridge
