services:
  - type: web
    name: ai-growth-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_WEBHOOK_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: POSTGRES_URI
        sync: false
      - key: REDIS_URL
        value: redis://localhost:6379

databases:
  - name: ai-growth-db
    plan: free
    databaseName: ai_growth_manager
