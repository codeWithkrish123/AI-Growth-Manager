services:
  - type: web
    name: ai-growth-manager-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: ai-growth-manager-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ai-growth-manager-redis
          property: connectionString
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_SCOPES
        value: read_products,write_products,read_orders,read_customers,read_checkouts,read_price_rules,write_price_rules,read_discounts
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: JWT_SECRET
        generate: true
      - key: ENCRYPTION_KEY
        generate: true
      - key: ADMIN_API_ACCESS_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: ai-growth-manager-db
    databaseName: ai_growth_manager
    user: postgres

services:
  - type: redis
    name: ai-growth-manager-redis
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
